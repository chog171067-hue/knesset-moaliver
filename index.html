<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת מוהליבר - דף הבית</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.45);
            z-index: 1;
        }
        header {
            background-color: rgba(26, 54, 93, 0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: relative;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            gap: 10px;
        }
        .nav-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .nav-logo {
            height: 45px;
            width: auto;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .nav-item {
            position: relative;
        }
        .nav-item a, .dropdown-toggle {
            color: #f7fafc;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: block;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .nav-item a:hover, .dropdown-toggle:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .nav-item.active a {
            background-color: #2b6cb0;
            color: white;
        }
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: #1a365d;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            min-width: 160px;
            z-index: 1000;
            margin: 0;
            padding: 5px 0;
            list-style: none;
        }
        .dropdown-menu li a {
            color: #f7fafc;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            text-align: right;
            border-radius: 0;
        }
        .dropdown-menu li a:hover {
            background-color: #2b6cb0;
        }
        .nav-item:hover .dropdown-menu {
            display: block;
        }
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: white;
            border-radius: 2px;
            transition: 0.3s;
        }
        .main-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .logo {
            max-width: 240px;
            height: auto;
            margin-bottom: 25px;
        }
        h1 {
            color: #1a365d;
            margin-bottom: 15px;
            font-size: 36px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        .welcome-text {
            font-size: 19px;
            line-height: 1.6;
            color: #2d3748;
            max-width: 600px;
            margin: 0 auto 40px auto;
            font-weight: 500;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }
        .grid-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #1a365d;
            font-weight: bold;
            font-size: 20px;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            border: 2px solid transparent;
        }
        .grid-item:hover {
            transform: translateY(-5px);
            background-color: #fff;
            border-color: #2b6cb0;
        }
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: row;
                justify-content: space-between;
            }
            .hamburger {
                display: flex;
            }
            .nav-menu {
                display: none;
                flex-direction: column;
                width: 100%;
                position: absolute;
                top: 70px;
                left: 0;
                background-color: #1a365d;
                padding: 15px 0;
                box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            }
            .nav-menu.open {
                display: flex;
            }
            .nav-item {
                text-align: center;
                width: 100%;
            }
            .nav-item a, .dropdown-toggle {
                padding: 12px 0;
                border-radius: 0;
                width: 100%;
                text-align: center;
            }
            .dropdown-menu {
                position: static;
                display: none;
                width: 100%;
                background-color: rgba(0, 0, 0, 0.2);
                box-shadow: none;
            }
            .nav-item.open-dropdown .dropdown-menu {
                display: block;
            }
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="nav-logo-link">
            <img src="logo.png" alt="לוגו בית כנסת מוהליבר" class="nav-logo">
        </a>
        
        <button class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <ul class="nav-menu" id="navMenu">
            <li class="nav-item active"><a href="index.html">דף הבית</a></li>
            
            <li class="nav-item" id="prayersDropdown">
                <button class="dropdown-toggle" onclick="toggleDropdown(event)">זמני התפילות ▾</button>
                <ul class="dropdown-menu">
                    <li><a href="yemothachol.html">ימות החול</a></li>
                    <li><a href="shabbat.html">שבתות וחגים</a></li>
                </ul>
            </li>
            
            <li class="nav-item"><a href="news.html">מהנעשה ונשמע</a></li>
            <li class="nav-item"><a href="personal.html">אזור אישי</a></li>
        </ul>
    </div>
</header>

<main class="main-content">
    <img src="logo.png" alt="לוגו בית כנסת מוהליבר" class="logo">
    <h1>בית הכנסת מוהליבר</h1>
    <p class="welcome-text">שלום וברוכים הבאים לאתר האינטרנט של בית כנסת מוהליבר.</p>
    
    <div class="grid-container">
        <a href="yemothachol.html" class="grid-item">זמני תפילות</a>
        <a href="news.html" class="grid-item">מהנעשה ונשמע</a>
    </div>
</main>

<script>
    function toggleMenu() {
        const menu = document.getElementById('navMenu');
        menu.classList.toggle('open');
    }

    function toggleDropdown(event) {
        if (window.innerWidth <= 768) {
            event.preventDefault();
            const dropdown = document.getElementById('prayersDropdown');
            dropdown.classList.toggle('open-dropdown');
        }
    }

    // מאזין אישור הרשמה והתחברות של Netlify Identity ברקע
    window.addEventListener('load', () => {
        if (typeof netlifyIdentity !== 'undefined') {
            netlifyIdentity.on('init', user => {
                if (user) {
                    window.location.href = "personal.html";
                }
            });

            netlifyIdentity.on('login', user => {
                window.location.href = "personal.html";
            });
        }
    });
</script>

</body>
</html>
