<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת מוהליבר - דף הבית</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.45);
            z-index: 1;
        }

        /* 1. סרגל כלים עליון */
        header {
            background-color: rgba(26, 54, 93, 0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: relative;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .nav-item {
            position: relative;
        }
        .nav-item a, .dropdown-toggle {
            color: #f7fafc;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: block;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .nav-item a:hover, .dropdown-toggle:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .nav-item.active a {
            background-color: #2b6cb0;
            color: white;
        }

        /* תפריט נפתח (Dropdown) לזמני תפילות */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: #1a365d;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            min-width: 160px;
            z-index: 1000;
            margin: 0;
            padding: 5px 0;
            list-style: none;
        }
        .dropdown-menu li a {
            color: #f7fafc;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            text-align: right;
            border-radius: 0;
        }
        .dropdown-menu li a:hover {
            background-color: #2b6cb0;
        }
        .nav-item:hover .dropdown-menu {
            display: block;
        }

        /* 2. מרכז הדף - סטריפ לבן חצי שקוף עם לוגו וטקסט (בגובה מסך מלא למניעת חפיפה ומכריח גלילה מטה) */
        .main-content {
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 70px); /* תופס בדיוק את כל גובה המסך פחות סרגל הכלים */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .center-strip {
            background: rgba(255, 255, 255, 0.75); /* סטריפ לבן חצי שקוף */
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            max-width: 280px; /* לוגו גדול */
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #1a365d;
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.4;
        }
        .tagline {
            color: #2d3748;
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
        }

        /* 3. תחתית העמוד - אזור הניווט ומפות (מתחת לקפל הגלילה) */
        .bottom-nav-section {
            position: relative;
            z-index: 2;
            background: rgba(255, 255, 255, 0.92);
            border-top: 2px solid #cbd5e0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .address-text {
            font-size: 20px;
            font-weight: bold;
            color: #1a365d;
        }
        .map-container {
            width: 100%;
            max-width: 600px;
            height: 280px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            border: 1px solid #cbd5e0;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .waze-btn {
            background-color: #2ec4b6;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(46, 196, 182, 0.25);
        }
        .waze-btn:hover {
            background-color: #0f9f90;
            transform: translateY(-1px);
        }

        /* 4. הערת קרדיט/רב בתחתית הדף */
        .footer-credits {
            font-size: 13px;
            color: #718096;
            margin-top: 15px;
            text-align: center;
            direction: ltr; /* אנגלית לשמאל */
            font-weight: 500;
        }

        /* התאמה למובייל */
        @media (max-width: 768px) {
            .nav-container {
                padding: 8px 10px;
            }
            .nav-menu {
                gap: 5px;
            }
            .nav-item a, .dropdown-toggle {
                font-size: 14px;
                padding: 8px 10px;
            }
            .main-content {
                min-height: calc(100vh - 55px);
            }
            .center-strip {
                width: 95%;
                padding: 25px 15px;
            }
            .logo {
                max-width: 200px;
            }
            h1 {
                font-size: 22px;
            }
            .tagline {
                font-size: 15px;
            }
            .map-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<header>
    <nav class="nav-container">
        <ul class="nav-menu">
            <li class="nav-item active"><a href="index.html">דף הבית</a></li>
            <li class="nav-item">
                <button class="dropdown-toggle">זמני התפילות ▾</button>
                <ul class="dropdown-menu">
                    <li><a href="shabbat.html">שבתות</a></li>
                    <li><a href="yemothachol.html">ימות החול</a></li>
                </ul>
            </li>
            <li class="nav-item"><a href="news.html">מהנעשה ונשמע</a></li>
            <li class="nav-item"><a href="personal.html">אזור אישי</a></li>
        </ul>
    </nav>
</header>

<main class="main-content">
    <div class="center-strip">
        <img src="logo.png" alt="לוגו בית כנסת מוהליבר" class="logo">
        <h1>
            דף המידע של<br>
            בית הכנסת המרכזי מוהליבר
        </h1>
        <div class="tagline">מגדלור של תורה ותפילה בשכונת 'מוהליבר'</div>
    </div>
</main>

<section class="bottom-nav-section">
    <div class="address-text">כתובת: מוהליבר 10 בני ברק</div>
    
    <div class="map-container">
        <iframe src="https://maps.google.com/maps?q=%D7%A9%D7%9E%D7%95%D7%90%D7%9C%20%D7%9E%D7%95%D7%94%D7%9C%D7%99%D7%91%D7%A8%2010%2C%20%D7%91%D7%A0%D7%99%20%D7%91%D7%A8%D7%A7&t=&z=16&ie=UTF8&iwloc=&output=embed" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <a href="https://waze.com/ul?q=%D7%A9%D7%9E%D7%95%D7%90%D7%9C%20%D7%9E%D7%95%D7%94%D7%9C%D7%99%D7%91%D7%A8%2010%20%D7%91%D7%A0%D7%99%20%D7%91%D7%A8%D7%A7&navigate=yes" class="waze-btn" target="_blank">
        ניווט באמצעות Waze 🚗
    </a>

    <div class="footer-credits">
        The Central Synagogue of Mohiliver, headed by Rabbi Ehud Shapira, Shlita
    </div>
</section>

<script>
    // מאזין אישור הרשמה והתחברות של Netlify Identity ברקע
    window.addEventListener('load', () => {
        if (typeof netlifyIdentity !== 'undefined') {
            netlifyIdentity.on('init', user => {
                if (user) {
                    window.location.href = "personal.html";
                }
            });

            netlifyIdentity.on('login', user => {
                window.location.href = "personal.html";
            });
        }
    });
</script>

</body>
</html>
