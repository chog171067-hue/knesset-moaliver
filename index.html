<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף הבית</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* הגדרות כלליות */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
            position: relative;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.45);
            z-index: 1;
        }

        /* סרגל ניווט עליון מיושר לאמצע */
        header {
            background-color: rgba(26, 54, 93, 0.95);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: relative;
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            gap: 10px;
        }
        .nav-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .nav-logo {
            height: 45px;
            width: auto;
        }
        .nav-menu {
            display: flex;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }
        .nav-item {
            position: relative;
        }
        .nav-item a, .dropdown-toggle {
            color: #f7fafc;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: block;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }
        .nav-item a:hover, .dropdown-toggle:hover {
            background-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .nav-item.active a {
            background-color: #2b6cb0;
            color: white;
        }

        /* תפריט נפתח (Dropdown) לזמני תפילות */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background-color: #1a365d;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            border-radius: 8px;
            min-width: 160px;
            z-index: 1000;
            margin: 0;
            padding: 5px 0;
            list-style: none;
        }
        .dropdown-menu li a {
            color: #f7fafc;
            padding: 10px 15px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            text-align: right;
            border-radius: 0;
        }
        .dropdown-menu li a:hover {
            background-color: #2b6cb0;
        }
        /* הצגת התפריט בריחוף (Desktop) */
        .nav-item:hover .dropdown-menu {
            display: block;
        }

        /* כפתור המבורגר לטלפונים ניידים */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            display: block;
            width: 28px;
            height: 3px;
            background-color: white;
            border-radius: 2px;
            transition: 0.3s;
        }

        /* תוכן מרכזי */
        .main-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.92);
            padding: 45px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            max-width: 650px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .main-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #1a365d;
            font-size: 26px;
            margin: 0 0 10px 0;
            line-height: 1.4;
        }
        .welcome-subtitle {
            font-size: 17px;
            color: #2b6cb0;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }

        /* סקשן ניווט והגעה נפרד ויוקרתי בתחתית הדף (Footer) */
        .navigation-footer {
            position: relative;
            z-index: 2;
            background-color: rgba(26, 54, 93, 0.96);
            padding: 30px 20px 15px 20px;
            border-top: 4px solid #2b6cb0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            margin-top: auto;
        }
        .location-text {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .waze-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #33ccff;
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(51, 204, 255, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .waze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(51, 204, 255, 0.45);
        }
        .waze-icon {
            width: 20px;
            height: 20px;
        }
        .map-container {
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 10px;
            background-color: #e2e8f0; /* צבע רקע למקרה של עיכוב בטעינה */
        }
        .map-container iframe {
            display: block;
            border: none;
            width: 100%;
            height: 240px;
        }

        /* שורת קידום מוסתרת-אלגנטית באנגלית */
        .seo-attribution {
            font-size: 11px;
            color: #a0aec0;
            letter-spacing: 0.5px;
            margin-top: 10px;
            font-weight: 400;
            direction: ltr;
        }

        /* התאמה לניידים */
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: row;
                justify-content: space-between;
            }
            .hamburger {
                display: flex;
            }
            .nav-menu {
                display: none;
                flex-direction: column;
                width: 100%;
                position: absolute;
                top: 70px;
                left: 0;
                background-color: #1a365d;
                padding: 15px 0;
                box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            }
            .nav-menu.open {
                display: flex;
            }
            .nav-item {
                text-align: center;
                width: 100%;
            }
            .nav-item a, .dropdown-toggle {
                padding: 12px 0;
                border-radius: 0;
                width: 100%;
                text-align: center;
            }
            .dropdown-menu {
                position: static;
                display: none;
                width: 100%;
                background-color: rgba(0, 0, 0, 0.2);
                box-shadow: none;
            }
            .nav-item.open-dropdown .dropdown-menu {
                display: block;
            }
            h1 {
                font-size: 20px;
            }
            .welcome-subtitle {
                font-size: 15px;
            }
            .main-logo {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="nav-container">
        <a href="index.html" class="nav-logo-link">
            <img src="logo.png" alt="לוגו" class="nav-logo">
        </a>
        
        <button class="hamburger" onclick="toggleMenu()" aria-label="תפריט ניווט">
            <span></span>
            <span></span>
            <span></span>
        </button>
        
        <ul class="nav-menu" id="navMenu">
            <li class="nav-item active"><a href="index.html">דף הבית</a></li>
            
            <li class="nav-item" id="prayersDropdown">
                <button class="dropdown-toggle" onclick="toggleDropdown(event)">זמני התפילות ▾</button>
                <ul class="dropdown-menu">
                    <li><a href="yemothachol.html">ימות החול</a></li>
                    <li><a href="shabbat.html">שבתות וחגים</a></li>
                </ul>
            </li>
            
            <li class="nav-item"><a href="news.html">מהנעשה ונשמע</a></li>
            <li class="nav-item"><a href="personal.html">אזור אישי</a></li>
        </ul>
    </div>
</header>

<main class="main-content">
    <div class="welcome-card">
        <img src="logo.png" alt="לוגו" class="main-logo">
        <h1>ברוכים הבאים לדף המידע של <br>ביהכנ"ס המרכזי 'מוהליבר'</h1>
        <p class="welcome-subtitle">מגדלור של תורה ותפילה בשכונת מוהליבר</p>
    </div>
</main>

<footer class="navigation-footer">
    <div class="location-text">📍 רחוב מוהליבר 10, בני ברק</div>
    
    <a href="https://waze.com/ul/hsv8y8by6x" target="_blank" class="waze-btn">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Waze_logo.svg" alt="Waze Logo" class="waze-icon">
        ניווט באמצעות Waze
    </a>
    
    <div class="map-container">
        <!-- קוד ה-iframe תוקן לכתובת הרשמית והתקינה של גוגל מפות -->
        <iframe 
            src="https://maps.google.com/maps?q=%D7%9E%D7%95%D7%94%D7%9C%D7%99%D7%91%D7%A8%2010,%20%D7%91%D7%A0%D7%99%20%D7%91%D7%A8%D7%A7&t=&z=16&ie=UTF8&iwloc=&output=embed" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>

    <div class="seo-attribution">
        The Central Synagogue of Mohiliver, headed by Rabbi Ehud Shapira, Shlita
    </div>
</footer>

<script>
    function toggleMenu() {
        const menu = document.getElementById('navMenu');
        menu.classList.toggle('open');
    }

    function toggleDropdown(event) {
        if (window.innerWidth <= 768) {
            event.preventDefault();
            const dropdown = document.getElementById('prayersDropdown');
            dropdown.classList.toggle('open-dropdown');
        }
    }
</script>

</body>
</html>
