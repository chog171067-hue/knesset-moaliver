<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת מוהליבר - דף הבית</title>
    <link rel="icon" type="image/png" href="logo.png">
    
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.45);
            z-index: 1;
        }
        .main-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .logo {
            max-width: 240px;
            height: auto;
            margin-bottom: 25px;
        }
        h1 {
            color: #1a365d;
            margin-bottom: 15px;
            font-size: 36px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }
        .welcome-text {
            font-size: 19px;
            line-height: 1.6;
            color: #2d3748;
            max-width: 600px;
            margin: 0 auto 40px auto;
            font-weight: 500;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
            width: 100%;
        }
        .grid-item {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-decoration: none;
            color: #1a365d;
            font-weight: bold;
            font-size: 20px;
            transition: transform 0.2s, background-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            border: 2px solid transparent;
        }
        .grid-item:hover {
            transform: translateY(-5px);
            background-color: #fff;
            border-color: #2b6cb0;
        }
        @media (max-width: 768px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<main class="main-content">
    <img src="logo.png" alt="לוגו בית כנסת מוהליבר" class="logo">
    <h1>בית הכנסת מוהליבר</h1>
    <p class="welcome-text">שלום וברוכים הבאים לאתר האינטרנט של בית כנסת מוהליבר.</p>
    
    <div class="grid-container">
        <a href="yemothachol.html" class="grid-item">זמני תפילות</a>
        <a href="news.html" class="grid-item">מהנעשה ונשמע</a>
    </div>
</main>

<script>
    // מאזין אישור הרשמה והתחברות של Netlify Identity ברקע
    window.addEventListener('load', () => {
        if (typeof netlifyIdentity !== 'undefined') {
            netlifyIdentity.on('init', user => {
                if (user) {
                    window.location.href = "personal.html";
                }
            });

            netlifyIdentity.on('login', user => {
                window.location.href = "personal.html";
            });
        }
    });
</script>

</body>
</html>
