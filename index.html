<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת מואליבר</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        .logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            background: #1a365d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #2a4365;
        }
        /* עיצוב לתפריט הכפתור הנפתח */
        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 100%;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 8px;
            overflow: hidden;
            margin-top: -8px;
        }
        .dropdown-content a {
            color: #333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }
        .dropdown-content a:last-child {
            border-bottom: none;
        }
        .dropdown-content a:hover {
            background-color: #f1f1f1;
            color: #1a365d;
        }
        .show {
            display: block;
        }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .nav-links .btn {
            margin: 0;
            font-size: 14px;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 2. במקום כותרת - לוגו בלבד -->
    <img src="logo.png" alt="לוגו בית כנסת מואליבר" class="logo">

    <!-- 3. כפתור אחד המשלב את שבת וימות החול בתפריט נפתח -->
    <div class="dropdown">
        <button onclick="toggleDropdown()" class="btn">זמני התפילות ▾</button>
        <div id="timesDropdown" class="dropdown-content">
            <a href="shabbat.html">שבתות</a>
            <a href="yemothachol.html">ימות החול</a>
        </div>
    </div>

    <!-- 1. כפתורי הניווט (כולל תיקון הקישור של המפה שלא ייתן שגיאת 403) -->
    <div class="nav-links">
        <a href="https://waze.com/ul?q=מונטפיורי+8+בני+ברק" target="_blank" class="btn" style="background: #007dff;">ניווט ב-Waze</a>
        <a href="https://maps.google.com/?q=מונטפיורי+8+בני+ברק" target="_blank" class="btn" style="background: #34a853;">ניווט במפה</a>
    </div>
</div>

<script>
    // פונקציה לפתיחה וסגירה של תפריט זמני התפילות
    function toggleDropdown() {
        document.getElementById("timesDropdown").classList.toggle("show");
    }

    // סגירת התפריט אם המשתמש לוחץ מחוץ לו
    window.onclick = function(event) {
        if (!event.target.matches('.btn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }
</script>

</body>
</html>
