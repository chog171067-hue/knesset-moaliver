<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>זמני תפילות - בית הכנסת מוהליבר</title>
    
    <link rel="icon" type="image/png" href="logo.png">
    
    <style>
        body { background-image: url('background.jpg'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-color: rgba(245, 245, 220, 0.85); background-blend-mode: overlay; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        
        .logo-container { margin-bottom: 2rem; }
        .logo-img { max-width: 250px; height: auto; display: block; margin: 0 auto; }

        .main-menu-container { display: flex; flex-direction: column; align-items: center; min-height: 150px; }
        
        .main-toggle-btn { display: inline-block; width: 220px; padding: 20px; border: 2px solid #800020; color: white; background-color: #800020; border-radius: 8px; font-weight: bold; font-size: 1.3rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .main-toggle-btn:hover { background-color: #600018; transform: translateY(-2px); }

        .sub-buttons { display: none; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px; }
        
        .nav-button { display: inline-block; width: 200px; padding: 18px; border: 2px solid #000080; color: #000080; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 1.1rem; transition: 0.3s; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .nav-button:hover { background-color: #000080; color: #F5F5DC; transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="logo-container">
        <img src="logo.png" alt="לוגו בית הכנסת מוהליבר" class="logo-img">
    </div>
    
    <div class="main-menu-container">
        <button class="main-toggle-btn" onclick="toggleMenu()">זמני התפילות</button>
        
        <div class="sub-buttons" id="subButtonsMenu">
            <a href="yemothachol.html" class="nav-button">זמני תפילות ימות החול</a>
            <a href="shabbat.html" class="nav-button">זמני תפילות שבתות</a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('subButtonsMenu');
            if (menu.style.display === 'flex') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'flex';
            }
        }
    </script>

</body>
</html>
