<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת מואליבר</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        /* רקע הדף עם השקיפות המקורית */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #333;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            opacity: 0.3;
            z-index: -1;
        }

        /* 2. הגדלה דרמטית של המכולה המרכזית (לוגו + כפתור זמנים בלבד) */
        .container {
            background: rgba(255, 255, 255, 0.9);
            padding: 50px 40px; /* יותר ריפוד פנימי למראה מרשים */
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 600px; /* הגדלה משמעותית של רוחב התיבה */
            width: 90%;
            margin-top: 12vh;
        }
        /* הגדלה דרמטית של הלוגו */
        .logo {
            max-width: 300px; 
            height: auto;
            margin-bottom: 35px;
        }
        /* הגדלה דרמטית של הכפתור הראשי */
        .btn {
            display: block;
            width: 100%;
            padding: 20px; /* ריפוד עבה יותר */
            margin: 12px 0;
            background: #1a365d;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 800; /* פונט עבה ובולט יותר */
            font-size: 22px; /* גודל טקסט גדול וברור */
            box-sizing: border-box;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover {
            background: #2a4365;
            transform: scale(1.02); /* אפקט הגדלה קל בריחוף */
        }

        /* עיצוב לתפריט הכפתור הנפתח (Dropdown) - מותאם לגודל החדש */
        .dropdown {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 100%;
            box-shadow: 0px 10px 20px 0px rgba(0,0,0,0.25);
            z-index: 10;
            border-radius: 12px;
            overflow: hidden;
            margin-top: -8px;
        }
        .dropdown-content a {
            color: #333;
            padding: 18px 16px; /* תפריט גדול ונוח ללחיצה בטלפון */
            text-decoration: none;
            display: block;
            font-weight: bold;
            font-size: 18px;
            border-bottom: 1px solid #eee;
            background: #fdfdfd;
        }
        .dropdown-content a:last-child {
            border-bottom: none;
        }
        .dropdown-content a:hover {
            background-color: #1a365d;
            color: white;
        }
        .show {
            display: block;
        }

        /* 1. מקטע ניווט ומפה - מורד עוד יותר למטה (דרושה גלילה ארוכה) */
        .bottom-section {
            width: 100%;
            max-width: 460px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px 15px 0 0;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
            margin-top: 300px; /* מרווח ענק שמוריד את המפה עמוק למטה */
            margin-bottom: 0;
        }
        .map-container {
            width: 100%;
            height: 150px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #ddd;
            margin-bottom: 12px;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .waze-btn {
            background: #007dff;
            margin: 0;
            font-size: 16px;
            padding: 12px;
        }
        .waze-btn:hover {
            background: #005ec3;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="לוגו בית כנסת מואליבר" class="logo">

    <div class="dropdown">
        <button onclick="toggleDropdown()" class="btn">זמני התפילות ▾</button>
        <div id="timesDropdown" class="dropdown-content">
            <a href="shabbat.html">שבתות</a>
            <a href="yemothachol.html">ימות החול</a>
        </div>
    </div>
</div>

<div class="bottom-section">
    <div class="map-container">
        <iframe 
            src="https://maps.google.com/maps?q=מוהליבר%2010,%20בני%20ברק&t=&z=16&ie=UTF8&iwloc=&output=embed" 
            allowfullscreen="" 
            loading="lazy">
        </iframe>
    </div>
    <a href="https://waze.com/ul?q=מוהליבר+10+בני+ברק" target="_blank" class="btn waze-btn">ניווט ב-Waze</a>
</div>

<script>
    function toggleDropdown() {
        document.getElementById("timesDropdown").classList.toggle("show");
    }

    window.onclick = function(event) {
        if (!event.target.matches('.btn')) {
            var dropdowns = document.getElementsByClassName("dropdown-content");
            for (var i = 0; i < dropdowns.length; i++) {
                var openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }
</script>

</body>
</html>
