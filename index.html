<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בית כנסת מוהליבר - דף הבית</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="assets/header.css">
    
    <!-- ספרית ה-Widget של Netlify Identity לקליטת אישורי מייל והתחברות ברקע -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.45);
            z-index: 1;
        }

        /* 2. מרכז הדף - סטריפ בגוון מותאם חצי שקוף */
        .main-content {
            position: relative;
            z-index: 2;
            min-height: calc(100vh - 70px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .center-strip {
            background: rgba(235, 248, 255, 0.8); /* גוון כחלחל-מלכותי עדין ושקוף */
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(26, 54, 93, 0.15);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo {
            max-width: 280px;
            height: auto;
            margin-bottom: 20px;
        }
        h1 {
            color: #1a365d;
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            line-height: 1.4;
        }
        .tagline {
            color: #2d3748;
            font-size: 18px;
            font-weight: 500;
            margin-top: 10px;
        }

        /* 3. תחתית העמוד - אזור הניווט בצבע מלא (מתחת לקפל הגלילה) */
        .bottom-nav-section {
            position: relative;
            z-index: 2;
            background: #1a365d; /* צבע כחול כהה מלא */
            border-top: 4px solid #2b6cb0; /* עיטור עליון כחול בהיר */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        .address-text {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff; /* התאמה לרקע כהה */
        }
        .map-container {
            width: 100%;
            max-width: 600px;
            height: 280px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
            border: 2px solid #2b6cb0;
        }
        .map-container iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }
        .waze-btn {
            background-color: #2ec4b6;
            color: white;
            text-decoration: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(46, 196, 182, 0.25);
        }
        .waze-btn:hover {
            background-color: #0f9f90;
            transform: translateY(-1px);
        }

        /* 4. הערת קרדיט/רב בתחתית הדף */
        .footer-credits {
            font-size: 13px;
            color: #cbd5e0; /* התאמה לרקע כהה */
            margin-top: 15px;
            text-align: center;
            direction: ltr;
            font-weight: 500;
        }

        /* התאמה למובייל */
        @media (max-width: 768px) {
            .main-content {
                min-height: calc(100vh - 55px);
            }
            .center-strip {
                width: 95%;
                padding: 25px 15px;
            }
            .logo {
                max-width: 200px;
            }
            h1 {
                font-size: 22px;
            }
            .tagline {
                font-size: 15px;
            }
            .map-container {
                height: 200px;
            }
        }
    </style>
</head>
<body>

<div id="site-header"></div>
<script src="assets/header.js"></script>

<main class="main-content">
    <div class="center-strip">
        <img src="logo.png" alt="לוגו בית כנסת מוהליבר" class="logo">
        <h1>
            דף המידע של<br>
            בית הכנסת המרכזי מוהליבר
        </h1>
        <div class="tagline">מגדלור של תורה ותפילה בשכונת 'מוהליבר'</div>
    </div>
</main>

<section class="bottom-nav-section">
    <div class="address-text">כתובת: הרב מוהליבר 10 בני ברק</div>
    
    <div class="map-container">
        <!-- מפת גוגל מעודכנת וממוקדת בדיוק על רחוב הרב מוהליבר 10, בני ברק -->
        <iframe src="https://maps.google.com/maps?q=%D7%94%D7%A8%D7%91%20%D7%9E%D7%95%D7%94%D7%9C%D7%99%D7%91%D7%A8%2010%20%D7%91%D7%A0%D7%99%20%D7%91%D7%A8%D7%A7&t=&z=17&ie=UTF8&iwloc=&output=embed" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </div>

    <!-- כפתור ניווט בוויז מעודכן לרחוב הרב מוהליבר -->
    <a href="https://waze.com/ul?q=%D7%94%D7%A8%D7%91%20%D7%9E%D7%95%D7%94%D7%9C%D7%99%D7%91%D7%A8%2010%20%D7%91%D7%A0%D7%99%20%D7%91%D7%A8%D7%A7&navigate=yes" class="waze-btn" target="_blank">
        ניווט באמצעות Waze 🚗
    </a>

    <div class="footer-credits">
        The Central Synagogue of Mohiliver, headed by Rabbi Ehud Shapira, Shlita
    </div>
</section>

<script src="assets/auth-widget.js"></script>

</body>
</html>
