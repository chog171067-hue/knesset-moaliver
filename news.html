<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מהנעשה ונשמע - בית כנסת מוהליבר</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="assets/header.css?v=2">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #333;
            position: relative;
            background: url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.45);
            z-index: 1;
        }

        /* תוכן */
        .main-content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h2 {
            color: #1a365d;
            margin-bottom: 15px;
        }
        p {
            font-size: 17px;
            color: #4a5568;
            line-height: 1.6;
            margin: 0;
        }

    </style>
</head>
<body>

<div id="site-header"></div>
<script src="assets/header.js?v=2"></script>

<main class="main-content">
    <div class="info-card">
        <div class="icon">📢</div>
        <h2>מהנעשה ונשמע בקהילה</h2>
        <p>כרגע הדף ריק. עובדים על תוכן איכותי בשבילכם.</p>
    </div>
</main>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script src="assets/auth-widget.js"></script>
</body>
</html>
