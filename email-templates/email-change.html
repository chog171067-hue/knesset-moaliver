<!DOCTYPE html>
<html lang="he" dir="rtl">
<head><meta charset="UTF-8"></head>
<body style="font-family: Arial, sans-serif; direction: rtl; text-align: right; color: #333; max-width: 500px; margin: 0 auto; padding: 20px;">
  <h2 style="color:#1a365d;">אישור שינוי כתובת מייל</h2>
  <p>קיבלנו בקשה לשנות את כתובת המייל של החשבון שלך באזור האישי, מ-{{ .Email }} ל-{{ .NewEmail }}.</p>
  <p>כדי לאשר את השינוי, יש ללחוץ על הכפתור הבא:</p>
  <p style="text-align:center; margin: 30px 0;">
    <a href="{{ .SiteURL }}/personal.html#email_change_token={{ .Token }}&type=email_change"
       style="background:#1a365d; color:#ffffff; text-decoration:none; padding:14px 28px; border-radius:8px; font-weight:bold; display:inline-block;">
      אישור שינוי המייל
    </a>
  </p>
  <p style="font-size:13px; color:#777;">אם לא ביקשת לשנות את כתובת המייל שלך, אפשר להתעלם לחלוטין מהודעה זו.</p>
</body>
</html>
