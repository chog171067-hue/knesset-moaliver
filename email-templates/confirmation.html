<!DOCTYPE html>

<body style="font-family: Arial, sans-serif; direction: rtl; text-align: right; color: #333; max-width: 500px; margin: 0 auto; padding: 20px;">

  <p>תודה שנרשמת לאזור האישי באתר בית הכנסת המרכזי מוהליבר.</p>

  <p style="text-align:center; margin: 30px 0;">
    <a href="{{ .SiteURL }}/personal.html#confirmation_token={{ .Token }}&type=signup"
       style="background:#1a365d; color:#ffffff; text-decoration:none; padding:14px 28px; border-radius:8px; font-weight:bold; display:inline-block;">
      אישור כתובת המייל
    </a>
  </p>
  <p style="font-size:13px; color:#777;">אם לא נרשמת בעצמך לאתר, אפשר להתעלם לחלוטין מהודעה זו.</p>
</body>
